<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экран 4 — Time Picker • Выбери время</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=SF+Pro+Display:wght@400;500;600&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
            background-color: #09090b; /* zinc-950 - глубокий черный */
        }
        
        /* Базовая анимация карточек */
        .time-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .time-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.5);
        }
        
        .time-card:active {
            transform: scale(0.98);
        }

        /* --- ПРЕМИАЛЬНЫЕ СОСТОЯНИЯ ВЫБОРА --- */

        /* 1. Выбрано тобой (Белый, тусклый градиент) */
        .state-you {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.08) 100%);
            border: 1px solid transparent;
            background-clip: padding-box;
        }

        /* 2. Выбрано Мэтчем (Лиловый #AC92DC) */
        .state-match {
            background: linear-gradient(90deg, rgba(172, 146, 220, 0.25) 0%, rgba(24, 24, 27, 0.6) 100%);
            border: 1px solid transparent;
            background-clip: padding-box;
        }

        /* 3. Выбрано обоими (Анимированный градиент Белый + #AC92DC) */
        .state-both {
            position: relative;
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid transparent;
            background-clip: padding-box;
        }
        
        /* Градиентная переливающаяся рамка */
        .state-both::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.5px;
            background: linear-gradient(90deg, rgba(255,255,255,0.7), #AC92DC, rgba(255,255,255,0.7), #AC92DC);
            background-size: 300% 100%;
            animation: gradientBorder 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 0%; }
        }

    </style>
</head>
<body class="text-white min-h-screen pb-32 relative">
    
    <div class="max-w-[420px] mx-auto px-5 pt-8">
        
        <!-- Заголовок и Легенда (как в нашем дизайне) -->
        <div class="mb-4">
            <h1 class="font-semibold text-[26px] tracking-tight mb-2">Pick a time</h1>
            
            <!-- Инфо-баннер (минималистичный, безрамочный) -->
            <div class="mb-5 pr-2">
                <p class="text-[14px] leading-relaxed text-white/60 font-medium">
                    Your match marked these times. Tap one to instantly agree, or pick your own — they'll see it live.
                </p>
            </div>
            
            <!-- Color Legend -->
            <div class="flex items-center gap-x-5 text-[13px] pl-1 font-medium">
                <div class="flex items-center gap-x-2.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-white/90 shadow-[0_0_8px_rgba(255,255,255,0.5)]"></div>
                    <span class="text-white uppercase tracking-wide text-[11px]">You</span>
                </div>
                <div class="flex items-center gap-x-2.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-[#AC92DC] shadow-[0_0_8px_rgba(172,146,220,0.5)]"></div>
                    <span class="text-white/60 uppercase tracking-wide text-[11px]">Match</span>
                </div>
                <div class="flex items-center gap-x-2.5">
                    <div class="flex -space-x-1">
                        <div class="w-2.5 h-2.5 rounded-full bg-white/90"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-[#AC92DC]"></div>
                    </div>
                    <span class="text-white/60 uppercase tracking-wide text-[11px]">Both</span>
                </div>
            </div>
        </div>

        <!-- Навигация по дате (четверг, 4 июня) -->
        <div class="flex items-center gap-3.5 mb-5 mt-6 pl-1">
            <button class="w-9 h-9 flex items-center justify-center rounded-full bg-white/[0.05] border border-white/[0.08] hover:bg-white/[0.1] active:scale-95 transition-all">
                <i class="fa-solid fa-chevron-left text-[14px] text-white/80 pr-0.5"></i>
            </button>
            <h2 class="text-[19px] font-semibold text-white tracking-wide">четверг, 4 июня</h2>
        </div>

        <!-- Time List (Premium Horizontal Capsules) -->
        <div class="flex flex-col space-y-3.5">
            
            <!-- Card 1: 17:30 (Выбрано Мэтчем) -->
            <div onclick="selectTime(this, '17:30')" 
                 class="time-card state-match rounded-2xl p-4 pl-5 cursor-pointer flex items-center justify-between relative">
                <div class="text-[18px] font-semibold z-10 text-white tracking-wide">
                    17:30
                </div>
                <div class="flex items-center gap-x-3 z-10">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-[#CDB7E9]">Match</span>
                    <div class="w-2.5 h-2.5 rounded-full bg-[#AC92DC] shadow-[0_0_10px_rgba(172,146,220,0.8)]"></div>
                </div>
            </div>
            
            <!-- Card 2: 18:00 (Выбрано ОБОИМИ) -->
            <div onclick="selectTime(this, '18:00')" 
                 class="time-card state-both rounded-2xl p-4 pl-5 cursor-pointer flex items-center justify-between shadow-[0_0_20px_rgba(172,146,220,0.15)]">
                <div class="text-[18px] font-semibold z-10 text-white tracking-wide">
                    18:00
                </div>
                <div class="flex items-center gap-x-3 z-10">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-[#AC92DC]">Both</span>
                    <div class="flex -space-x-1.5 items-center">
                        <div class="w-4 h-4 rounded-full bg-white/90 ring-2 ring-[#18181b] relative z-10"></div>
                        <div class="w-4 h-4 rounded-full bg-[#AC92DC] ring-2 ring-[#18181b] relative z-0"></div>
                    </div>
                </div>
            </div>
            
            <!-- Card 3: 18:30 (Обычная) -->
            <div onclick="selectTime(this, '18:30')" 
                 class="time-card bg-[#18181b] border border-white/[0.06] rounded-2xl p-4 pl-5 cursor-pointer flex items-center justify-between">
                <div class="text-[18px] font-medium text-white/90 tracking-wide">
                    18:30
                </div>
            </div>
            
            <!-- Card 4: 19:00 (Обычная) -->
            <div onclick="selectTime(this, '19:00')" 
                 class="time-card bg-[#18181b] border border-white/[0.06] rounded-2xl p-4 pl-5 cursor-pointer flex items-center justify-between">
                <div class="text-[18px] font-medium text-white/90 tracking-wide">
                    19:00
                </div>
            </div>

            <!-- Card 5: 19:30 (Обычная) -->
            <div onclick="selectTime(this, '19:30')" 
                 class="time-card bg-[#18181b] border border-white/[0.06] rounded-2xl p-4 pl-5 cursor-pointer flex items-center justify-between">
                <div class="text-[18px] font-medium text-white/90 tracking-wide">
                    19:30
                </div>
            </div>
            
            <!-- Card 6: 20:00 (Выбрано ТОБОЙ) -->
            <div onclick="selectTime(this, '20:00')" 
                 class="time-card state-you rounded-2xl p-4 pl-5 cursor-pointer flex items-center justify-between relative mt-6">
                <div class="text-[18px] font-semibold z-10 text-white tracking-wide">
                    20:00
                </div>
                <div class="flex items-center gap-x-3 z-10">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-white/70">You</span>
                    <div class="w-2.5 h-2.5 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)]"></div>
                </div>
            </div>

        </div>
        
    </div>

    <!-- Всплывающая кнопка Confirm внизу -->
    <div class="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-[#09090b] via-[#09090b]/90 to-transparent pointer-events-none z-20">
        <div class="max-w-[420px] mx-auto pointer-events-auto">
            <button onclick="confirmSelection()" class="w-full bg-white text-black font-bold text-[17px] py-4 rounded-2xl shadow-[0_0_25px_rgba(255,255,255,0.15)] hover:bg-gray-50 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>Confirm</span>
            </button>
        </div>
    </div>
    
    <script>
        function selectTime(element, timeLabel) {
            // Мягкий отклик при нажатии
            element.style.transform = 'scale(0.97)';
            setTimeout(() => { element.style.transform = ''; }, 150);
            
            console.log('Выбрано время:', timeLabel);
        }

        function confirmSelection() {
            console.log('Selection confirmed!');
            // Здесь будет логика подтверждения
        }
    </script>
</body>
</html>
