<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Gennety Verification</title>
    <script>(function(){try{var t=localStorage.getItem("gennety-theme");document.documentElement.dataset.theme=(t==="light"||t==="dark")?t:"dark";}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!--
      Persona Embedded SDK — pinned to v5.1.5. Reads `Persona.Client` after
      load; we initialise it from verification.ts once /init returns the
      Persona template/environment ids tied to this user's reference id.
      Camera/mic permissions inside the Mini App require the host domain
      (dating-calendar.gennety.com) to be registered via BotFather /setdomain.
    -->
    <script src="https://cdn.withpersona.com/dist/persona-v5.1.5.js"></script>
    <!--
      Inline CSS — same pattern as location.html. The earlier external
      stylesheet variant (`<link rel="stylesheet" href="/src/verification.css">`)
      served the Vite HMR wrapper, not raw CSS, and produced a black-screen
      Mini App in dev. Inlining sidesteps all dev-mode quirks; prod is
      unaffected because Vite ships the same HTML literally.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: var(--tg-theme-bg-color, #fff);
        --secondary-bg: var(--tg-theme-secondary-bg-color, #f3f4f6);
        --text: var(--tg-theme-text-color, #111);
        --hint: var(--tg-theme-hint-color, #6b7280);
        --primary: var(--tg-theme-button-color, #2481cc);
        --primary-text: var(--tg-theme-button-text-color, #fff);
        --success: #16a34a;
        --error: #dc2626;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, system-ui, sans-serif;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .screen {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        gap: 16px;
        text-align: center;
      }
      .screen-text {
        font-size: 15px;
        color: var(--hint);
        margin: 0;
        line-height: 1.4;
        max-width: 320px;
      }
      .screen-title {
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
        margin: 0;
        line-height: 1.3;
      }
      .persona-mount {
        flex: 1 1 auto;
        position: relative;
        width: 100%;
      }
      .persona-mount iframe {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        border: 0;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--secondary-bg);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error-glyph {
        font-size: 48px;
        color: var(--error);
        line-height: 1;
      }
      /* Animated success checkmark — the "all done" beat after Persona passes.
         Pure inline SVG + CSS (no Lottie runtime / CDN) so it can't fail to
         load inside the Telegram WebView and adds nothing to the bundle. */
      .check-anim {
        position: relative;
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
      }
      .check-anim__halo {
        position: absolute;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: var(--success);
        opacity: 0;
        transform: scale(0.4);
        animation: check-halo 0.9s ease-out 0.12s both;
      }
      .check-anim__svg {
        position: relative;
        width: 84px;
        height: 84px;
        overflow: visible;
      }
      .check-anim__disc {
        fill: var(--success);
        transform-origin: 50% 50%;
        transform: scale(0);
        animation: check-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .check-anim__tick {
        fill: none;
        stroke: #fff;
        stroke-width: 4.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 33;
        stroke-dashoffset: 33;
        animation: check-draw 0.34s cubic-bezier(0.65, 0, 0.45, 1) 0.34s
          forwards;
      }
      .check-caption {
        opacity: 0;
        animation: check-caption-in 0.4s ease-out 0.5s forwards;
      }
      @keyframes check-pop {
        0% {
          transform: scale(0);
        }
        60% {
          transform: scale(1.06);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes check-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes check-halo {
        0% {
          opacity: 0.28;
          transform: scale(0.4);
        }
        100% {
          opacity: 0;
          transform: scale(1.3);
        }
      }
      @keyframes check-caption-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .check-anim__halo {
          animation: none;
          opacity: 0;
        }
        .check-anim__disc {
          animation: none;
          transform: scale(1);
        }
        .check-anim__tick {
          animation: none;
          stroke-dashoffset: 0;
        }
        .check-caption {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Initial loading shell — JS swaps this for Persona's iframe, an error
        card, or the success screen depending on the SDK lifecycle. Inline so
        the user never sees a blank flash while verification.ts boots.
      -->
      <div class="screen" id="loading-screen">
        <div class="spinner" aria-hidden="true"></div>
        <p class="screen-text" id="loading-text"></p>
      </div>
    </div>
    <script type="module" src="/src/verification.ts"></script>
  </body>
</html>
