<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Gennety Verification</title>
    <script>(function(){try{var q=new URLSearchParams(location.search).get("theme");if(q==="light"||q==="dark"){try{localStorage.setItem("gennety-theme",q);}catch(e){}}var t=(q==="light"||q==="dark")?q:localStorage.getItem("gennety-theme");document.documentElement.dataset.theme=(t==="light"||t==="dark")?t:"dark";}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!--
      Persona Embedded SDK — pinned to v5.1.5. Reads `Persona.Client` after
      load; we initialise it from verification.ts once /init returns the
      Persona template/environment ids tied to this user's reference id.
      Camera/mic permissions inside the Mini App require the host domain
      (dating-calendar.gennety.com) to be registered via BotFather /setdomain.
    -->
    <script src="https://cdn.withpersona.com/dist/persona-v5.1.5.js"></script>
    <!--
      Inline CSS — same pattern as location.html. The earlier external
      stylesheet variant (`<link rel="stylesheet" href="/src/verification.css">`)
      served the Vite HMR wrapper, not raw CSS, and produced a black-screen
      Mini App in dev. Inlining sidesteps all dev-mode quirks; prod is
      unaffected because Vite ships the same HTML literally.
    -->
    <style>
      /* Self-contained theme tokens (mirrors theme.css). Inlined on purpose:
         this file avoids a JS-imported stylesheet because that produced a
         black-screen Mini App in dev (see the note above), and inline tokens
         also dodge a first-paint flash while the module loads. Values track the
         shared Liquid Glass kit + burgundy brand. */
      :root,
      :root[data-theme="dark"] {
        --bg: #030303;
        --text: #e9e6e5;
        --text-muted: #8e8895;
        --accent: #8b253b;
        --accent-bright: #b6304f;
        --glass-bg: rgba(255, 255, 255, 0.055);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glass-highlight: rgba(255, 255, 255, 0.16);
        --glass-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        --glass-blur: 22px;
        --success: #28c76f;
        --error: #e0566e;
      }
      :root[data-theme="light"] {
        --bg: #f5f5f5;
        --text: #1d1d1d;
        --text-muted: #6b6670;
        --glass-bg: rgba(255, 255, 255, 0.55);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-highlight: rgba(255, 255, 255, 0.9);
        --glass-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }
      /* Soft burgundy ambience so the frosted glass has something to refract. */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(120% 55% at 85% -10%, rgba(139, 37, 59, 0.3), transparent 60%),
          radial-gradient(95% 45% at -5% 108%, rgba(139, 37, 59, 0.16), transparent 55%);
      }
      :root[data-theme="light"] body::before {
        background:
          radial-gradient(120% 55% at 85% -10%, rgba(139, 37, 59, 0.16), transparent 60%),
          radial-gradient(95% 45% at -5% 108%, rgba(139, 37, 59, 0.08), transparent 55%);
      }
      #root {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .screen {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 96px 24px 32px;
        gap: 16px;
        text-align: center;
      }
      /* Liquid Glass status panel wrapping the spinner / check / message. */
      .screen__panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        width: 100%;
        max-width: 340px;
        padding: 36px 28px;
        border-radius: 28px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
        backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
      }
      .screen-text {
        font-size: 15px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.45;
        max-width: 300px;
      }
      .screen-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        margin: 0;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .persona-mount {
        flex: 1 1 auto;
        position: relative;
        width: 100%;
      }
      .persona-mount iframe {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        border: 0;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--glass-border);
        border-top-color: var(--accent-bright);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error-glyph {
        font-size: 48px;
        line-height: 1;
      }
      /* Animated success checkmark — the "all done" beat after Persona passes.
         Pure inline SVG + CSS (no Lottie runtime / CDN) so it can't fail to
         load inside the Telegram WebView and adds nothing to the bundle. */
      .check-anim {
        position: relative;
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
      }
      .check-anim__halo {
        position: absolute;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: var(--success);
        opacity: 0;
        transform: scale(0.4);
        animation: check-halo 0.9s ease-out 0.12s both;
      }
      .check-anim__svg {
        position: relative;
        width: 84px;
        height: 84px;
        overflow: visible;
      }
      .check-anim__disc {
        fill: var(--success);
        transform-origin: 50% 50%;
        transform: scale(0);
        animation: check-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .check-anim__tick {
        fill: none;
        stroke: #fff;
        stroke-width: 4.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 33;
        stroke-dashoffset: 33;
        animation: check-draw 0.34s cubic-bezier(0.65, 0, 0.45, 1) 0.34s
          forwards;
      }
      .check-caption {
        opacity: 0;
        animation: check-caption-in 0.4s ease-out 0.5s forwards;
      }
      @keyframes check-pop {
        0% {
          transform: scale(0);
        }
        60% {
          transform: scale(1.06);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes check-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes check-halo {
        0% {
          opacity: 0.28;
          transform: scale(0.4);
        }
        100% {
          opacity: 0;
          transform: scale(1.3);
        }
      }
      @keyframes check-caption-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .check-anim__halo {
          animation: none;
          opacity: 0;
        }
        .check-anim__disc {
          animation: none;
          transform: scale(1);
        }
        .check-anim__tick {
          animation: none;
          stroke-dashoffset: 0;
        }
        .check-caption {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Initial loading shell — JS swaps this for Persona's iframe, an error
        card, or the success screen depending on the SDK lifecycle. Inline so
        the user never sees a blank flash while verification.ts boots.
      -->
      <div class="screen" id="loading-screen">
        <div class="spinner" aria-hidden="true"></div>
        <p class="screen-text" id="loading-text"></p>
      </div>
    </div>
    <script type="module" src="/src/verification.ts"></script>
  </body>
</html>
