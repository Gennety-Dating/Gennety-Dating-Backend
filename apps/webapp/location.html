<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Gennety Location</title>
    <!-- Paint the dark backdrop on the very first frame so the Mini App doesn't
         flash a white/unstyled screen before the bundled CSS loads. -->
    <style>
      html,
      body {
        margin: 0;
        background: #120e1c;
      }
    </style>
    <script>(function(){try{var q=new URLSearchParams(location.search).get("theme");if(q==="light"||q==="dark"){try{localStorage.setItem("gennety-theme",q);}catch(e){}}var t=(q==="light"||q==="dark")?q:localStorage.getItem("gennety-theme");document.documentElement.dataset.theme=(t==="light"||t==="dark")?t:"dark";}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- Full-bleed map backdrop -->
    <div id="map"></div>
    <div id="scrim"></div>

    <!-- Center-pin picker: the map moves under a fixed pin -->
    <div id="pin-shadow"></div>
    <svg id="pin" width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7z"
        fill="#8b253b"
        stroke="#b6304f"
        stroke-width="1.2"
      />
      <circle cx="12" cy="9" r="2.6" fill="#ffffff" />
    </svg>

    <!-- TOP island: search + floating results dropdown -->
    <div class="layer top">
      <div class="island search-wrap">
        <span class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7" />
            <path d="m20 20-3.5-3.5" />
          </svg>
        </span>
        <input type="text" class="search" id="search" placeholder="" autocomplete="off" />
      </div>
      <div class="island results" id="results"></div>
    </div>

    <!-- BOTTOM island: address readout + "use my location" + confirm CTA -->
    <div class="layer bottom">
      <div class="island confirm-island">
        <div class="addr-row">
          <span class="pin-ico" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z" />
              <circle cx="12" cy="10" r="2.4" />
            </svg>
          </span>
          <div class="txt">
            <div class="label" id="addr-label"></div>
            <div class="value" id="selected">&nbsp;</div>
          </div>
        </div>
        <!-- Secondary text action: use the device's current position -->
        <button type="button" class="loc-btn" id="share-current">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3.2" />
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
          </svg>
          <span class="loc-btn-text"></span>
        </button>
        <button type="button" class="cta" id="confirm">
          <span class="cta-text"></span>
          <span class="spinner" aria-hidden="true"></span>
          <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </button>
      </div>
    </div>

    <!-- No-context fallback (opened without a match id) -->
    <div id="no-context" style="display: none"></div>

    <!-- Venue Intent V2: location stays in memory while the second step opens. -->
    <section id="vibe-stage" class="vibe-stage" hidden aria-live="polite">
      <div class="vibe-card">
        <button id="vibe-back" class="vibe-back" type="button" aria-label="Back">←</button>
        <div class="vibe-step">2 / 2</div>
        <h1 id="vibe-title">What should the date feel like?</h1>
        <p id="vibe-help">Describe it naturally — for example: quiet gallery and a walk, no alcohol.</p>
        <div id="vibe-suggestions" class="vibe-suggestions"></div>
        <textarea id="vibe-text" maxlength="500" rows="4" placeholder="Cozy, design-forward place where we can really talk…"></textarea>
        <button id="vibe-interpret" class="cta" type="button"><span class="cta-text">Continue</span></button>
        <div id="vibe-review" hidden>
          <p class="vibe-review-label">I understood this:</p>
          <div id="vibe-chips" class="vibe-chips"></div>
          <div class="vibe-constraints" id="vibe-constraints"></div>
          <button id="vibe-confirm" class="cta" type="button"><span class="cta-text">Everything looks right</span></button>
        </div>
        <p id="vibe-error" class="vibe-error" role="alert"></p>
      </div>
    </section>

    <script type="module" src="/src/location.ts"></script>
  </body>
</html>
