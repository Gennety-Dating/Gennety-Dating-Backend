<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Gennety · Choose your type</title>
    <script>(function(){try{var q=new URLSearchParams(location.search).get("theme");if(q==="light"||q==="dark"){try{localStorage.setItem("gennety-theme",q);}catch(e){}}var t=(q==="light"||q==="dark")?q:localStorage.getItem("gennety-theme");document.documentElement.dataset.theme=(t==="light"||t==="dark")?t:"dark";}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
    <!-- Telegram SDK deferred so it never blocks the first paint of the shell
         below. It still runs before the module (both deferred, in order). -->
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <!-- Fonts loaded non-render-blocking: the shell paints instantly with the
         system fallback, the web font swaps in when ready. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- Critical shell CSS, inlined so the loading screen is on screen BEFORE
         any JS/CSS bundle, the ngrok warning, or the Telegram SDK resolve.
         Theme-aware via the [data-theme] set by the pre-paint snippet above. -->
    <style>
      :root {
        --boot-bg: #030303;
        --boot-surface: #141414;
        --boot-border: rgba(255, 255, 255, 0.08);
        --boot-accent: #8b253b;
        --boot-sheen: rgba(255, 255, 255, 0.1);
        --boot-fill: rgba(255, 255, 255, 0.08);
      }
      :root[data-theme="light"] {
        --boot-bg: #f5f5f5;
        --boot-surface: #e9e9e9;
        --boot-border: rgba(0, 0, 0, 0.08);
        --boot-accent: #8b253b;
        --boot-sheen: rgba(0, 0, 0, 0.06);
        --boot-fill: rgba(0, 0, 0, 0.08);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--boot-bg);
      }
      #root {
        height: 100%;
      }
      .boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 15% 18px 13%;
        box-sizing: border-box;
      }
      .boot-stack {
        position: relative;
        flex: 1;
        width: 100%;
        min-height: 0;
      }
      .boot-ghost {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(62%, 240px);
        aspect-ratio: 3 / 4;
        border-radius: 22px;
        background-color: var(--boot-surface);
        border: 1px solid var(--boot-border);
        background-image: linear-gradient(
          100deg,
          transparent 20%,
          var(--boot-sheen) 50%,
          transparent 80%
        );
        background-size: 200% 100%;
        background-repeat: no-repeat;
        animation: bootSheen 1.4s ease-in-out infinite;
      }
      .boot-ghost.g1 {
        transform: translate(-50%, -50%);
        z-index: 3;
      }
      .boot-ghost.g2 {
        transform: translate(-58%, -52%) rotate(-7deg);
        z-index: 2;
        opacity: 0.7;
        animation-delay: 0.15s;
      }
      .boot-ghost.g3 {
        transform: translate(-42%, -48%) rotate(7deg);
        z-index: 1;
        opacity: 0.5;
        animation-delay: 0.3s;
      }
      .boot-bar {
        position: relative;
        width: min(70%, 240px);
        height: 6px;
        border-radius: 999px;
        background: var(--boot-fill);
        overflow: hidden;
      }
      .boot-bar > span {
        position: absolute;
        top: 0;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: var(--boot-accent);
        animation: bootSlide 1.1s ease-in-out infinite;
      }
      @keyframes bootSheen {
        0% {
          background-position: 150% 0;
        }
        100% {
          background-position: -150% 0;
        }
      }
      @keyframes bootSlide {
        0% {
          left: -40%;
        }
        100% {
          left: 100%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-ghost,
        .boot-bar > span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static app shell: on screen at first paint, replaced by React on
           mount. Matches the React loading state for a seamless handoff. -->
      <div class="boot">
        <div class="boot-stack">
          <span class="boot-ghost g3"></span>
          <span class="boot-ghost g2"></span>
          <span class="boot-ghost g1"></span>
        </div>
        <div class="boot-bar"><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/radar/main.tsx"></script>
  </body>
</html>
