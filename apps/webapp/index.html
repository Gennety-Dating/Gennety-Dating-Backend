<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gennety Calendar</title>
    <script>(function(){try{var q=new URLSearchParams(location.search).get("theme");if(q==="light"||q==="dark"){try{localStorage.setItem("gennety-theme",q);}catch(e){}}var t=(q==="light"||q==="dark")?q:localStorage.getItem("gennety-theme");document.documentElement.dataset.theme=(t==="light"||t==="dark")?t:"dark";}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      /* Design tokens — self-contained (both themes) so the inline styles never
       * flash before a JS-imported sheet loads. Mirrors the shared theme.css +
       * Liquid Glass values. "You/mine" is a theme-flipping neutral; the peer
       * ("match") accent is the unified burgundy.
       *
       * Burgundy comes in two tones of the SAME hue (347°): `--brand` #8b253b
       * (L 34%) and `--brand-light` #d16b80 (L 62%). They are not two colours —
       * they are one brand colour at two lightnesses, and which one applies is
       * decided by what sits on top:
       *   --brand       — burgundy CARRYING white text (the NEW pill: 8.7:1).
       *   --brand-light — burgundy that must read AGAINST the page ITSELF: the
       *                   peer's fill, dot, rule and gradients.
       * On the near-black page only lightness carries contrast, so #8b253b on
       * the #161616 card is 2.1:1 — below the 3:1 floor for UI graphics, which
       * is why a peer slot used to vanish. #d16b80 is 5.3:1. In LIGHT theme the
       * page is bright, so `--brand-light` resolves back to #8b253b and every
       * peer affordance below is byte-identical to before. */
      :root,
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #030303;
        --surface: #161616;
        --surface-2: #202020;
        --surface-3: #2a2a2e;
        /* Default (unselected) date/time slot fill — one step darker than
         * `--surface-3` so the empty chips read a touch deeper while still
         * sitting clearly above the sheet (`--surface` #161616). Kept as its
         * own token so `.btn-secondary:hover` (which uses `--surface-3`) is
         * untouched. */
        --slot-bg: #1e1e21;
        --card-frame: #3c242b;
        --text: #e9e6e5;
        --text-90: rgba(233, 230, 229, 0.92);
        --text-70: rgba(233, 230, 229, 0.7);
        --text-60: rgba(233, 230, 229, 0.6);
        --text-40: rgba(233, 230, 229, 0.42);
        --border: rgba(255, 255, 255, 0.1);
        --border-2: rgba(255, 255, 255, 0.08);
        --fill: rgba(255, 255, 255, 0.05);
        --fill-strong: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.03);
        --brand: #8b253b;
        --brand-light: #d16b80;
        --brand-glow: rgba(209, 107, 128, 0.45);
        --brand-glow-soft: rgba(209, 107, 128, 0.16);
        /* Peer wash. Tuned against `--self-fill-*` so a peer slot and a mine
         * slot land on the same lightness step (both composite over --bg):
         * white .25 → #424242, this → #552d35. Equal weight, different colour. */
        --brand-fill-strong: rgba(209, 107, 128, 0.4);
        --brand-fill-soft: rgba(209, 107, 128, 0.1);
        --cta-bg: #ffffff;
        --cta-fg: #0a0a0a;
        --cta-glow: rgba(255, 255, 255, 0.15);
        --cta-hover: #f0f0f0;
        --self: #ffffff;
        --self-glow: rgba(255, 255, 255, 0.7);
        --self-fill-strong: rgba(255, 255, 255, 0.25);
        --self-fill-soft: rgba(255, 255, 255, 0.08);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "Inter", system-ui, sans-serif;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        /* Telegram chrome inset (close ×, menu ⋯) — populated from
         * `Telegram.WebApp.contentSafeAreaInset.top` at boot. The 56px
         * fallback covers older clients that don't expose the property,
         * and a brief flash before the first `contentSafeAreaChanged`. */
        --tg-content-top: 56px;
        --tg-content-bottom: 0px;
      }
      :root[data-theme="light"] {
        color-scheme: light;
        --bg: #f5f5f5;
        --surface: #ffffff;
        --surface-2: #ececec;
        --surface-3: #e2e2e2;
        /* Light-theme empty slot, a touch darker than `--surface-3` so the
         * default chips read a step deeper against the bright sheet. */
        --slot-bg: #cccccc;
        --card-frame: #f0e2e5;
        /* Light theme keeps the deep burgundy: on a bright page it is the tone
         * that reads, so these are the pre-existing values, unchanged. */
        --text: #1d1d1d;
        --text-90: rgba(29, 29, 29, 0.92);
        --text-70: rgba(29, 29, 29, 0.66);
        --text-60: rgba(29, 29, 29, 0.56);
        --text-40: rgba(29, 29, 29, 0.4);
        --border: rgba(0, 0, 0, 0.12);
        --border-2: rgba(0, 0, 0, 0.08);
        --fill: rgba(0, 0, 0, 0.05);
        --fill-strong: rgba(0, 0, 0, 0.09);
        --glass-bg: rgba(0, 0, 0, 0.03);
        --brand-light: #8b253b;
        --brand-glow: rgba(139, 37, 59, 0.35);
        --brand-glow-soft: rgba(139, 37, 59, 0.12);
        --brand-fill-strong: rgba(139, 37, 59, 0.28);
        --brand-fill-soft: rgba(139, 37, 59, 0.05);
        --cta-bg: #1d1d1d;
        --cta-fg: #ffffff;
        --cta-glow: rgba(0, 0, 0, 0.14);
        --cta-hover: #2c2c2c;
        --self: #1d1d1d;
        --self-glow: rgba(0, 0, 0, 0.35);
        /* "Mine" wash (state-you gradient only). Intentionally stronger than a
         * naive mirror of dark: the light empty slot is now `--surface-3` (a mid
         * grey, not white), so a faint black wash barely reads against it. These
         * darker blacks make the user's own mark a clearly-accented chip while
         * keeping the dark label text readable. */
        --self-fill-strong: rgba(0, 0, 0, 0.24);
        --self-fill-soft: rgba(0, 0, 0, 0.12);
      }

      * { box-sizing: border-box; }

      /* `.legend` / `.slots` use `display: flex`, which has equal specificity
       * to the UA stylesheet's `[hidden] { display: none }` rule but loses
       * the cascade because author styles come later. Force the hidden
       * semantics back so toggling `el.hidden = true` actually hides. */
      [hidden] { display: none !important; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-stack);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-size-adjust: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }

      body {
        padding-bottom: calc(120px + var(--safe-bottom));
      }

      .page {
        max-width: 420px;
        margin: 0 auto;
        padding: calc(20px + var(--safe-top) + var(--tg-content-top)) 20px 0;
      }

      h1.title {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 24px;
      }

      /* ── Banner ──────────────────────────────────────────────── */

      .banner {
        margin: 0 0 24px;
        padding: 16px;
        border-radius: 16px;
        background: var(--glass-bg);
        border: 1px solid var(--border-2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        font-size: 13px;
        line-height: 1.5;
        font-weight: 500;
        color: var(--text-90);
      }

      /* In the time picker the banner is minimalist (no border, no bg). */
      .banner.banner-minimal {
        background: transparent;
        border: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        box-shadow: none;
        padding: 0 8px 0 4px;
        margin-bottom: 20px;
        font-size: 14px;
        color: var(--text-60);
      }

      /* ── Legend ──────────────────────────────────────────────── */

      .legend {
        display: flex;
        gap: 20px;
        margin: 0 0 28px;
        padding-left: 4px;
        font-size: 13px;
        font-weight: 500;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .legend-dot.dot-you {
        background: var(--self);
        box-shadow: 0 0 8px var(--self-glow);
      }
      .legend-dot.dot-match {
        background: var(--brand-light);
        box-shadow: 0 0 8px var(--brand-glow);
      }
      .legend-pair { display: flex; }
      /* Match the calendar section: the white "you" dot overlaps ON TOP of
       * the lilac "match" dot, not the reverse. DOM order paints lilac last,
       * so lift the white (first child) above it explicitly. */
      .legend-pair .legend-dot { box-shadow: none; position: relative; }
      .legend-pair .legend-dot:first-child { z-index: 1; }
      .legend-pair .legend-dot + .legend-dot { margin-left: -4px; z-index: 0; }
      .legend-label {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 11px;
      }
      .legend-item.is-you .legend-label { color: var(--text); }
      .legend-item.is-other .legend-label { color: var(--text-60); }

      /* ── Time picker date header (back chevron + date label) ─── */

      .date-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 24px 0 20px;
        padding-left: 4px;
      }
      .back-button {
        width: 36px;
        height: 36px;
        flex: 0 0 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: var(--fill);
        border: 1px solid var(--border-2);
        color: var(--text-90);
        cursor: pointer;
        transition: background 160ms ease, transform 100ms ease;
      }
      .back-button:hover { background: var(--fill-strong); }
      .back-button:active { transform: scale(0.95); }
      .back-button svg { width: 14px; height: 14px; display: block; }
      .date-header-title {
        font-size: 19px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      /* ── Slots (date and time cards share the same shell) ────── */

      .slots {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .slot {
        appearance: none;
        font: inherit;
        color: inherit;
        text-align: left;
        /* Default (unpressed) bubble is borderless: the shape is carried by an
         * elevated *tone*, not an outline. It uses `--slot-bg` (one step below
         * `--surface-3`) — a touch darker than a plain surface chip, but still
         * NOT `--surface`: the time slots live inside the `.sheet` (also
         * `--surface`), so a `--surface` fill would be invisible there — same
         * colour, no edge. `--slot-bg` sits a clear step above both the sheet
         * (`--surface`) and the page (`--bg`) in both themes, so the chip reads
         * in either context.
         * Kept as a 1px *transparent* border (not `border: none`) purely as a
         * box-size spacer, so the selected states below — which flip
         * `border-color` to their tint / transparent — keep the exact same
         * dimensions and unchanged press/hover/active effects. */
        background: var(--slot-bg);
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 16px 16px 16px 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: relative;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .slot:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.5);
      }
      .slot:active { transform: scale(0.98); }

      .slot-label {
        font-size: 15px;
        font-weight: 500;
        display: flex;
        gap: 6px;
        align-items: baseline;
        z-index: 1;
      }
      .slot-label .slot-weekday { color: var(--text-40); }
      .slot-label .slot-day { color: var(--text-90); }
      .slot-time-label {
        font-size: 18px;
        font-weight: 500;
        color: var(--text-90);
        letter-spacing: 0.02em;
        z-index: 1;
      }

      .slot-indicator {
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 1;
      }

      /* NEW marker — peer added/changed a slot since the user's last save.
       * A small, flat brand pill on the slot's top-right corner. Compact and
       * untilted so it reads as a clean, modern tag rather than a sale sticker. */
      .badge-new {
        position: absolute;
        top: -7px;
        right: 10px;
        z-index: 2;
        padding: 2px 7px;
        border-radius: 999px;
        background: var(--brand);
        color: #fff;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(139, 37, 59, 0.32);
        pointer-events: none;
      }
      .indicator-tag {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .indicator-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .indicator-pair {
        display: flex;
        align-items: center;
      }
      .indicator-pair-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        outline: 2px solid var(--surface);
        position: relative;
      }
      .indicator-pair-dot + .indicator-pair-dot { margin-left: -6px; z-index: 0; }
      .indicator-pair-dot:first-child { z-index: 1; }

      /* State: mine (theme-flipping neutral) */
      .slot.state-you {
        background: linear-gradient(
          90deg,
          var(--self-fill-strong) 0%,
          var(--self-fill-soft) 100%
        );
        border-color: transparent;
        background-clip: padding-box;
      }
      .slot.state-you .slot-label .slot-weekday,
      .slot.state-you .slot-label .slot-day { color: var(--text-90); }
      .slot.state-you .slot-label .slot-day { font-weight: 700; color: var(--text); }
      .slot.state-you .slot-time-label { font-weight: 600; color: var(--text); }
      .slot.state-you .indicator-tag { color: var(--text-70); }
      .slot.state-you .indicator-dot {
        background: var(--self);
        box-shadow: 0 0 10px var(--self-glow);
      }

      /* State: peer (burgundy — the light tone, mirroring `state-you` exactly).
       * The old wash was the DARK tone faded into an opaque `--surface`, so it
       * composited to #290d13 against the mine slot's #424242: same shape, a
       * third of the weight. Both states now run strong → soft over the page. */
      .slot.state-match {
        background: linear-gradient(
          90deg,
          var(--brand-fill-strong) 0%,
          var(--brand-fill-soft) 100%
        );
        border-color: transparent;
        background-clip: padding-box;
      }
      .slot.state-match .slot-label .slot-weekday { color: var(--text-90); }
      .slot.state-match .slot-label .slot-day { font-weight: 700; color: var(--text); }
      .slot.state-match .slot-time-label { font-weight: 600; color: var(--text); }
      .slot.state-match .indicator-tag { color: var(--brand-light); }
      .slot.state-match .indicator-dot {
        background: var(--brand-light);
        box-shadow: 0 0 10px var(--brand-glow);
      }

      /* State: both (animated gradient border) */
      .slot.state-both {
        background: var(--surface);
        border-color: transparent;
        background-clip: padding-box;
        box-shadow: 0 0 20px var(--brand-glow-soft);
      }
      .slot.state-both::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.5px;
        background: linear-gradient(
          90deg,
          var(--self),
          var(--brand-light),
          var(--self),
          var(--brand-light)
        );
        background-size: 300% 100%;
        animation: gradient-border 3s linear infinite;
        -webkit-mask: linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        pointer-events: none;
      }
      .slot.state-both .slot-label .slot-weekday { color: var(--text-70); }
      .slot.state-both .slot-label .slot-day { font-weight: 600; color: var(--text); }
      .slot.state-both .slot-time-label { font-weight: 600; color: var(--text); }
      .slot.state-both .indicator-tag {
        background: linear-gradient(90deg, var(--self), var(--brand-light));
        -webkit-background-clip: text;
                background-clip: text;
        color: transparent;
      }

      /* "Other time" card — when both sides picked the SAME day at DIFFERENT
       * slots, the day card carries the «Другое время» / "Other time" status,
       * a long two-word label in every locale. Modeled on the Antigravity
       * composer field: a lighter rounded frame with the darker field inset
       * and pushed DOWN, so the frame's taller top edge reads as a header
       * "window" that holds the label (and the NEW pill). Replaces the earlier
       * gradient-border treatment for this one state; every other card — incl.
       * the «Совпало» overlap card — keeps its own shape and corner NEW. */
      .slot.has-topbar {
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 0;
        background: var(--card-frame);
        border-color: transparent;
        box-shadow: 0 10px 26px -14px rgba(0, 0, 0, 0.7);
      }
      /* Drop the animated gradient border — the lighter frame stands in for it. */
      .slot.has-topbar.state-both::before { content: none; }
      .slot.has-topbar .slot-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 14px 8px 20px;
      }
      /* The darker inner field — inset on the sides and bottom, flush under the
       * header so the lighter frame reads as one continuous window around it. */
      .slot.has-topbar .slot-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 4px 4px;
        padding: 14px 14px 14px 16px;
        background: var(--surface);
        border-radius: 13px;
      }
      /* NEW pill flows inline on the header's right edge (vs. corner sticker). */
      .slot-topbar .badge-new {
        position: static;
        top: auto;
        right: auto;
      }

      @keyframes gradient-border {
        0% { background-position: 0% 0%; }
        100% { background-position: 100% 0%; }
      }

      /* ── Sticky CTA bar (replaces native MainButton) ─────────── */

      .cta-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 20px calc(20px + var(--safe-bottom));
        background: linear-gradient(
          to top,
          var(--bg) 0%,
          var(--bg) 60%,
          transparent 100%
        );
        z-index: 20;
        pointer-events: none;
      }
      .cta-inner {
        max-width: 420px;
        margin: 0 auto;
        pointer-events: auto;
      }
      .btn-primary {
        appearance: none;
        width: 100%;
        height: 56px;
        border: none;
        border-radius: 16px;
        background: var(--cta-bg);
        color: var(--cta-fg);
        font: inherit;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 0 25px var(--cta-glow);
        transition: background 160ms ease, transform 100ms ease, opacity 160ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary:hover { background: var(--cta-hover); }
      .btn-primary:active { transform: scale(0.96); }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary .spinner { display: none; }
      .btn-primary.is-loading .spinner { display: inline-block; }
      .btn-primary.is-loading .label { opacity: 0.7; }
      .spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(128, 128, 128, 0.3);
        border-top-color: var(--cta-fg);
        animation: spin 800ms linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .btn-secondary {
        appearance: none;
        width: 100%;
        height: 48px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 160ms ease, transform 100ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-secondary:hover { background: var(--surface-3); }
      .btn-secondary:active { transform: scale(0.95); }

      /* ── Agreed (success) view ───────────────────────────────── */

      .success-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-top: 16px;
      }
      .check-svg {
        width: 84px;
        height: 84px;
        margin: 32px 0 48px;
        color: var(--brand-light);
      }
      .check-svg path {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: check-dash 1.2s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        animation-delay: 0.3s;
      }
      @keyframes check-dash { to { stroke-dashoffset: 0; } }

      .agreed-card {
        width: 100%;
        background: var(--glass-bg);
        border: 1px solid var(--border-2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
        transition: transform 500ms ease;
      }
      .agreed-card:hover { transform: scale(1.02); }
      .agreed-date {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 4px;
      }
      .agreed-time {
        font-size: 48px;
        font-weight: 700;
        line-height: 1.05;
        background: linear-gradient(90deg, var(--self), var(--brand-light));
        -webkit-background-clip: text;
                background-clip: text;
        color: transparent;
        margin: 0;
      }
      .agreed-subtitle {
        font-size: 14px;
        color: var(--text-60);
        line-height: 1.5;
        padding: 0 16px;
        margin: 0 0 32px;
      }

      /* Remind chip — full-width card under the subtitle, icon-on-top layout.
       * Match design screen_5_success.html (flex-1 inside `flex w-full`). */
      .remind-chip {
        appearance: none;
        font: inherit;
        color: inherit;
        cursor: pointer;
        background: var(--glass-bg);
        border: 1px solid var(--border-2);
        border-radius: 20px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 40px;
        width: 100%;
        transition: background 160ms ease, opacity 240ms ease;
        overflow: hidden;
      }
      .remind-chip:hover { background: var(--fill); }
      .remind-chip:active { background: var(--fill-strong); }
      .remind-chip-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-70);
        transform-origin: 50% 0%;
      }
      .remind-chip-icon svg { width: 20px; height: 20px; }
      .remind-chip-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-70);
      }
      .remind-chip.is-armed {
        opacity: 0.55;
        pointer-events: none;
      }
      .remind-chip.is-armed .remind-chip-icon {
        animation: bell-shake 0.6s ease-in-out forwards;
      }
      @keyframes bell-shake {
        0%   { transform: rotate(0); }
        15%  { transform: rotate(10deg); }
        30%  { transform: rotate(-10deg); }
        45%  { transform: rotate(6deg); }
        60%  { transform: rotate(-6deg); }
        75%  { transform: rotate(3deg); }
        100% { transform: rotate(0); }
      }

      /* ── Waiting (saved) view ────────────────────────────────── */

      .saved-page {
        display: flex;
        flex-direction: column;
        padding-top: 24px;
        /* The fixed `.saved-actions` is a two-button column (~156px + safe),
         * taller than the body's global 120px CTA reservation. Top it up here
         * so the last saved-pick chip clears the "Change my picks" button
         * instead of sliding under it. */
        padding-bottom: 60px;
      }
      .saved-hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 24px;
      }
      .saved-eyebrow {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text);
        margin: 0;
      }
      .saved-check {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: var(--fill-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 48px;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 0.1s;
        opacity: 0;
      }
      .saved-check svg { width: 48px; height: 48px; color: var(--text); }
      .saved-title {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text);
        margin: 0;
        opacity: 0;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 0.2s;
      }
      .saved-subtitle {
        font-size: 15px;
        line-height: 1.5;
        color: var(--text-60);
        font-weight: 500;
        max-width: 280px;
        margin: 0;
        opacity: 0;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 0.3s;
      }
      .saved-picks {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 16px;
        opacity: 0;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 0.4s;
      }
      .saved-pick-chip {
        padding: 12px 24px;
        border-radius: 999px;
        background: var(--surface);
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }
      /* Fixed bottom bar — same gradient + safe-area treatment as `.cta-bar`,
       * so the two-button column stays anchored while the hero scrolls. */
      .saved-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 20px calc(20px + var(--safe-bottom));
        background: linear-gradient(
          to top,
          var(--bg) 0%,
          var(--bg) 60%,
          transparent 100%
        );
        z-index: 30;
        pointer-events: none;
      }
      .saved-actions-inner {
        max-width: 420px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: auto;
      }
      .saved-actions .btn-secondary,
      .saved-actions .btn-primary {
        opacity: 0;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      .saved-actions .btn-secondary { animation-delay: 0.5s; }
      .saved-actions .btn-primary { animation-delay: 0.6s; }

      @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        70% { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }

      /* ── Bottom sheet (time picker) ──────────────────────────── */

      .sheet-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        opacity: 0;
        transition: opacity 220ms ease;
        z-index: 40;
        pointer-events: none;
      }
      .sheet-backdrop.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: var(--surface);
        border-top-left-radius: 28px;
        border-top-right-radius: 28px;
        padding-top: 10px;
        display: flex;
        flex-direction: column;
        max-height: 80vh;
        max-height: 80dvh;
        transform: translateY(100%);
        transition: transform 320ms cubic-bezier(0.32, 0.72, 0, 1);
        box-shadow: 0 -20px 60px -10px rgba(0, 0, 0, 0.6);
        border-top: 1px solid var(--border-2);
      }
      .sheet.is-open { transform: translateY(0); }

      .sheet-handle {
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: var(--text-40);
        margin: 0 auto 14px;
        flex: 0 0 auto;
      }

      .sheet-header {
        padding: 0 24px 20px;
        text-align: center;
        flex: 0 0 auto;
      }
      .sheet-title {
        font-size: 19px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
        color: var(--text);
      }

      .sheet-body {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        /* 12px top padding so the first slot's top-right NEW sticker
         * (top:-8px) doesn't get clipped by overflow:auto. */
        padding: 12px 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .sheet-footer {
        position: relative;
        flex: 0 0 auto;
        padding: 16px 20px calc(20px + var(--safe-bottom));
        background: var(--surface);
      }
      /* Soft fade where the scrollable body meets the sticky footer. */
      .sheet-footer::before {
        content: "";
        position: absolute;
        top: -28px;
        left: 0;
        right: 0;
        height: 28px;
        background: linear-gradient(to top, var(--surface), transparent);
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .sheet { transition: none !important; }
        .sheet-backdrop { transition: none !important; }
      }

      /* ── Multi-overlap (final time-picker choice, screen_7) ────── */

      .overlap-hero {
        text-align: center;
        padding: 24px 0 24px;
      }
      .overlap-hero h2 {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.15;
        margin: 0 0 12px;
      }
      .overlap-hero p {
        font-size: 14px;
        color: var(--text-60);
        font-weight: 500;
        line-height: 1.5;
        margin: 0;
        padding: 0 16px;
      }
      .overlap-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      /* Neutral card — used for every option until tap. No radio dot, the
       * whole row is the affordance (screen_7_final_time_picker_choice). */
      .overlap-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 20px 20px 20px 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: relative;
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                    background 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .overlap-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.6);
      }
      .overlap-card:active {
        transform: scale(0.97);
      }
      /* Selected state: lilac sweep, fully borderless. Drop the border
       * entirely (not just transparent) — a 1px transparent border on
       * a gradient background causes a sub-pixel light edge along the
       * right side at the rounded corner. Padding +1px on each side
       * compensates for the missing border so card edges don't shift. */
      .overlap-card.is-selected {
        background: linear-gradient(
          90deg,
          var(--brand-fill-strong) 0%,
          var(--brand-fill-soft) 100%
        );
        border: none;
        padding: 21px 21px 21px 25px;
        box-shadow:
          0 12px 30px -8px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
      }
      .overlap-text {
        font-size: 16px;
        font-weight: 500;
        display: flex;
        align-items: baseline;
        gap: 6px;
      }
      .overlap-day {
        color: var(--text-40);
        transition: color 0.3s ease;
      }
      .overlap-time {
        color: var(--text-90);
        transition: color 0.3s ease, font-weight 0.3s ease;
      }
      .overlap-card.is-selected .overlap-day { color: var(--text); }
      .overlap-card.is-selected .overlap-time { color: var(--text); font-weight: 600; }

      /* ── Confetti (success) ─────────────────────────────────── */

      .confetti-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .confetti {
        position: absolute;
        border-radius: 2px;
        pointer-events: none;
      }
      @keyframes fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
      }

      /* ── No-context fallback ─────────────────────────────────── */

      #no-context {
        padding: 40px 20px;
        color: var(--text-60);
        font-size: 14px;
        text-align: center;
      }

      @media (prefers-reduced-motion: reduce) {
        .slot, .agreed-card { transition: none !important; }
        .slot:hover { transform: none; box-shadow: none; }
        .check-svg path, .saved-check, .saved-title, .saved-subtitle,
        .saved-picks, .saved-actions .btn-primary, .saved-actions .btn-secondary {
          animation: none !important;
          opacity: 1 !important;
        }
        .slot.state-both::before { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="page" id="page">
      <h1 class="title" id="title"></h1>
      <div id="banner" hidden></div>
      <div id="legend" class="legend" hidden>
        <span class="legend-item is-you">
          <span class="legend-dot dot-you"></span>
          <span class="legend-label" data-legend="mine"></span>
        </span>
        <span class="legend-item is-other">
          <span class="legend-dot dot-match"></span>
          <span class="legend-label" data-legend="peer"></span>
        </span>
        <span class="legend-item is-other">
          <span class="legend-pair">
            <span class="legend-dot dot-you"></span>
            <span class="legend-dot dot-match"></span>
          </span>
          <span class="legend-label" data-legend="overlap"></span>
        </span>
      </div>
      <div id="slots" class="slots"></div>
      <div id="agreed" hidden></div>
      <div id="waiting" hidden></div>
      <div id="multi-overlap" hidden></div>
    </div>
    <div class="confetti-canvas" id="confetti-canvas" hidden></div>
    <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
    <div class="sheet" id="sheet" hidden role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="sheet-handle" aria-hidden="true"></div>
      <header class="sheet-header">
        <h2 class="sheet-title" id="sheet-title"></h2>
      </header>
      <div class="sheet-body" id="sheet-body"></div>
      <footer class="sheet-footer">
        <button type="button" id="sheet-cta" class="btn-primary">
          <span class="label"></span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </footer>
    </div>
    <div class="cta-bar" id="cta-bar" hidden>
      <div class="cta-inner">
        <button type="button" id="cta" class="btn-primary">
          <span class="label"></span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <p id="no-context" hidden></p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
