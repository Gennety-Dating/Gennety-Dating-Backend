<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gennety Calendar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        --slot-bg: var(--tg-theme-secondary-bg-color, #f3f4f6);
        --slot-border: var(--tg-theme-hint-color, #d4d4d8);
        --mine: var(--tg-theme-button-color, #2481cc);
        --mine-text: var(--tg-theme-button-text-color, #fff);
        --peer: #f59e0b;
        --overlap: #16a34a;
      }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        background: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #111);
      }
      h1 { font-size: 18px; margin: 0 0 12px; }
      #banner {
        margin: 0 0 12px;
        padding: 12px 14px;
        border-radius: 12px;
        background: var(--tg-theme-secondary-bg-color, #fff7ed);
        border: 1px solid var(--peer);
        font-size: 14px;
        line-height: 1.4;
      }
      #legend {
        display: flex;
        gap: 12px;
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--tg-theme-hint-color, #6b7280);
      }
      #legend .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        margin-right: 6px;
        vertical-align: middle;
      }
      .swatch.mine { background: var(--mine); }
      .swatch.peer { background: var(--peer); }
      .swatch.overlap { background: var(--overlap); }
      .slots { display: grid; gap: 8px; }
      .slots.times { display: block; }
      button.slot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--slot-border);
        background: var(--slot-bg);
        color: inherit;
        font-size: 15px;
        line-height: 1.25;
        text-align: left;
        cursor: pointer;
        transition: transform 0.05s, border-color 0.1s, background 0.1s;
      }
      button.slot:active { transform: scale(0.98); }
      button.slot.mine {
        background: var(--mine);
        color: var(--mine-text);
        border-color: transparent;
      }
      button.slot.peer {
        background: transparent;
        border-color: var(--peer);
        border-width: 2px;
      }
      button.slot.overlap {
        background: var(--overlap);
        color: #fff;
        border-color: transparent;
      }
      button.slot.mixed {
        background: linear-gradient(90deg, var(--peer) 0 7px, var(--mine) 7px 100%);
        color: var(--mine-text);
        border-color: var(--peer);
        box-shadow: 0 0 0 1px var(--peer) inset;
      }
      button.slot .tag {
        flex: 0 0 auto;
        margin-left: auto;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.85);
        color: #111;
        white-space: nowrap;
      }
      button.slot.peer .tag { background: var(--peer); color: #fff; }
      button.slot.overlap .tag { background: rgba(255,255,255,0.25); color: #fff; }
      button.slot.mixed .tag { background: var(--peer); color: #fff; }
      .time-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 12px;
      }
      .back-date {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid var(--slot-border);
        background: var(--tg-theme-secondary-bg-color, #f3f4f6);
        color: inherit;
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
      }
      .time-header-title {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.3;
      }
      .time-list {
        display: grid;
        gap: 8px;
      }
      #agreed {
        display: none;
        text-align: center;
        padding: 32px 16px;
      }
      #agreed h2 { font-size: 22px; margin: 0 0 8px; }
      #agreed .agreed-time {
        font-size: 18px;
        font-weight: 600;
        margin: 8px 0 16px;
      }
      #agreed p { margin: 0; color: var(--tg-theme-hint-color, #6b7280); }
      #waiting {
        display: none;
        text-align: center;
        padding: 32px 16px;
      }
      #waiting h2 { font-size: 22px; margin: 0 0 8px; }
      #waiting > p {
        margin: 0 0 20px;
        color: var(--tg-theme-hint-color, #6b7280);
        line-height: 1.45;
      }
      .picks-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        margin: 0 0 24px;
      }
      .picks-summary .chip {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--tg-theme-secondary-bg-color, #f3f4f6);
        font-size: 13px;
      }
      .card-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .btn-primary, .btn-secondary {
        padding: 12px 22px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .btn-primary {
        background: var(--tg-theme-button-color, #2481cc);
        color: var(--tg-theme-button-text-color, #fff);
      }
      .btn-secondary {
        background: transparent;
        color: var(--tg-theme-text-color, #111);
        border-color: var(--tg-theme-hint-color, #d4d4d8);
      }
      #multi-overlap {
        display: none;
        padding: 24px 16px 80px;
      }
      #multi-overlap h2 {
        font-size: 20px;
        margin: 0 0 6px;
        text-align: center;
      }
      #multi-overlap > p {
        margin: 0 0 20px;
        color: var(--tg-theme-hint-color, #6b7280);
        text-align: center;
      }
      .radio-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .radio-option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--tg-theme-secondary-bg-color, #f3f4f6);
        cursor: pointer;
        font-size: 15px;
      }
      .radio-option input[type="radio"] { accent-color: var(--mine); }
      #no-context { color: var(--tg-theme-hint-color, #6b7280); }
    </style>
  </head>
  <body>
    <h1 id="title">Pick a date</h1>
    <div id="banner" style="display:none"></div>
    <div id="legend">
      <span><span class="swatch mine"></span><span data-legend="mine">You</span></span>
      <span><span class="swatch peer"></span><span data-legend="peer">Match</span></span>
      <span><span class="swatch overlap"></span><span data-legend="overlap">Both</span></span>
    </div>
    <div class="slots" id="slots"></div>
    <div id="agreed"></div>
    <div id="waiting"></div>
    <div id="multi-overlap"></div>
    <p id="no-context"></p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
